<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace | HoopsVault</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="marketplace">
    <header class="topbar">
      <a class="brand" href="index.html">HoopsVault</a>
      <nav class="nav-links">
        <a href="marketplace.html">Marketplace</a>
        <a href="create-listing.html">Sell</a>
        <a href="messages.html">Messages</a>
      </nav>
      <div class="nav-actions">
        <span id="userBadge" class="user-badge"></span>
        <a id="authLink" class="button small" href="login.html">Sign in</a>
      </div>
    </header>

    <main class="market-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Marketplace</p>
          <h2>Browse NBA cards and discover your next trade.</h2>
        </div>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="Search by player or seller" />
        </div>
      </div>
      <div class="filters" id="filters"></div>
      <div id="listingGrid" class="card-grid"></div>
    </main>

    <footer>
      <p>© 2026 HoopsVault. Built for NBA collectors.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
