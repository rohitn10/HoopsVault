<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account | HoopsVault</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="signup">
        <header class="topbar sticky">
      <a class="brand" href="/">HoopsVault</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/marketplace">Marketplace</a>
        <a href="/create-listing">Sell</a>
        <a href="/messages">Messages</a>
      </nav>
      <div class="nav-actions">
        <span id="userBadge" class="user-badge"></span>
        <a id="loginLink" class="button small secondary" href="/login">Login</a>
        <a id="signupLink" class="button small primary" href="/signup">Sign up</a>
        <a id="authLink" class="button small secondary" href="/login">Sign in</a>
      </div>
    </header>

    <main class="auth-section">
      <div class="auth-grid">
        <div class="auth-card">
          <p class="eyebrow">Create collector account</p>
          <h2>Start buying, selling, and trading NBA cards.</h2>
          <p>Sign up to browse listings, message sellers, and publish your own cards.</p>
        </div>
        <div class="auth-card">
          <h3>Create account</h3>
          <div id="registerMessage" class="alert" style="display:none"></div>
          <form id="registerForm" class="form-grid">
            <label>
              Name
              <input type="text" name="name" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Password
              <input type="password" name="password" required />
            </label>
            <div class="form-actions">
              <button class="button primary" type="submit">Create account</button>
              <a class="button secondary" href="/login">Log in</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <p>© 2026 HoopsVault. Built for NBA collectors.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
